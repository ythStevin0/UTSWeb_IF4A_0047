<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarHex | Enter The Future Battle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;900&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
        <div class="container-fluid px-3">
            <div class="d-flex align-items-center flex-grow-1">
                <ul class="navbar-nav flex-row align-items-center warhex-nav warhex-left">
                    <li class="nav-item"><a class="nav-link px-2 text-dark" href="#series">SERIES</a></li>
                    <li class="nav-item"><span class="warhex-sep" aria-hidden="true"></span></li>
                    <li class="nav-item"><a class="nav-link px-2 text-dark" href="#news">NEWS</a></li>
                    <li class="nav-item"><span class="warhex-sep" aria-hidden="true"></span></li>
                    <li class="nav-item"><a class="nav-link px-2 text-dark" href="#products">PRODUCTS</a></li>
                    <li class="nav-item"><span class="warhex-sep" aria-hidden="true"></span></li>
                </ul>
            </div>

            <a class="navbar-brand mx-4 d-inline-flex align-items-center gap-2" href="#">
                <img class="brand-mark" src="assets/logoWarHex.png" alt="WarHex logo">
                <span>WARHEX</span>
            </a>

            <div class="d-flex align-items-center flex-grow-1 justify-content-end">
                <ul class="navbar-nav flex-row align-items-center warhex-nav warhex-right">
                    <li class="nav-item"><span class="warhex-sep" aria-hidden="true"></span></li>
                    <li class="nav-item"><a class="nav-link px-2 text-dark" href="#about">ABOUT</a></li>
                    <li class="nav-item"><span class="warhex-sep" aria-hidden="true"></span></li>
                    <li class="nav-item"><a class="nav-link px-2 text-dark" href="#language">LANGUAGE</a></li>
                    <li class="nav-item"><span class="warhex-sep" aria-hidden="true"></span></li>
                    <li class="nav-item"><a class="nav-link px-2 text-dark" href="#login">LOG IN</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero-warhex position-relative overflow-hidden" id="home">
            <div class="hero-bg" aria-hidden="true" style="background-image: url('assets/WarHex1.png');"></div>
            <div class="hero-overlay" aria-hidden="true"></div>

            <div class="container-fluid hero-content position-relative">
                <div class="row min-vh-100 align-items-center">
                    <div class="col-12 col-md-6 col-lg-4">
                        <p class="hero-kicker mb-3">WELCOME TO WARHEX</p>

                        <h1 class="hero-title mb-3">
                            ENTER THE<br>
                            FUTURE OF<br>
                            <span>BATTLE</span>
                        </h1>

                        <p class="hero-description mb-4">
                            WarHex is a next-generation gaming
                            experience. No limits. No lag.
                            Just pure battle.
                        </p>

                        <a class="btn hero-button d-inline-flex align-items-center justify-content-between" href="#series">
                            <span>EXPLORE NOW</span>
                            <i class="bi bi-arrow-right" aria-hidden="true"></i>
                        </a>
                    </div>
                </div>
            </div>

            <div class="hero-slider-dots" aria-label="Hero slide indicator">
                <button class="active" type="button" aria-label="Slide 1" data-slide="0"></button>
                <button type="button" aria-label="Slide 2" data-slide="1"></button>
                <button type="button" aria-label="Slide 3" data-slide="2"></button>
                <button type="button" aria-label="Slide 4" data-slide="3"></button>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const heroBg = document.querySelector('.hero-bg');
        const heroDots = document.querySelectorAll('.hero-slider-dots button');
        const slides = [
            'assets/WarHex1.png',
            'assets/WarHex2.png',
            'assets/WarHex3.png',
            'assets/WarHex4.png'
        ];
        let currentSlide = 0;

        function setHeroSlide(index) {
            currentSlide = index;
            heroBg.style.backgroundImage = `url('${slides[index]}')`;
            heroDots.forEach((dot, idx) => {
                dot.classList.toggle('active', idx === index);
            });
        }

        heroDots.forEach((dot) => {
            dot.addEventListener('click', () => {
                setHeroSlide(Number(dot.dataset.slide));
            });
        });

        setInterval(() => {
            const nextSlide = (currentSlide + 1) % slides.length;
            setHeroSlide(nextSlide);
        }, 5000);
    </script>
</body>
</html>
